name: Build Android APK

on:
  workflow_dispatch:

env:
  # 提前适配 GitHub Actions 即将默认 Node24 的变更（现在只是 warning）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Prepare mobile env (.env.development)
        run: |
          cat > litenote-mobile-app/.env.development <<EOF
          NODE_ENV=development
          API_BASE_URL=https://fin.fleey.site
          API_TIMEOUT=10000
          ENABLE_LOGS=true
          ENABLE_FLIPPER=true
          DEBUG_NETWORK=true
          DEBUG_REDUX=true
          MOCK_API=false
          APP_NAME=LiteNote
          APP_VERSION=1.0.0
          BUILD_NUMBER=1
          SENTRY_DSN=
          SENTRY_DSN_ANDROID=
          EOF          

      - name: Install deps (monorepo)
        run: |
          npm run install:all          

      - name: Build APK (Release)
        run: |
          npm run mobile:build:prod          

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteNote-APK
          path: |
            litenote-mobile-app/android/app/build/outputs/apk/**/*.apk            
          if-no-files-found: error
